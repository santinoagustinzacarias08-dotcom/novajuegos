<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi Proyecto 2.0</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #111827;
    }

    header h1 {
      font-size: 20px;
      color: #60a5fa;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      opacity: 0.8;
    }

    nav a:hover {
      opacity: 1;
    }

    .hero {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 60px 20px;
    }

    .hero-content {
      max-width: 700px;
    }

    .hero h2 {
      font-size: 40px;
      margin-bottom: 15px;
    }

    .hero p {
      opacity: 0.8;
      margin-bottom: 25px;
      line-height: 1.5;
    }

    .btn {
      background: #3b82f6;
      padding: 12px 25px;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    .btn:hover {
      background: #2563eb;
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #111827;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <header>
    <h1>Mi Proyecto 2.0</h1>
    <nav>
      <a href="#">Inicio</a>
      <a href="#">Servicios</a>
      <a href="#">Contacto</a>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-content">
      <h2>Bienvenido a la versión 2.0 🚀</h2>
      <p>Una web moderna lista para usar y modificar.</p>
      <button class="btn" onclick="alert('Funciona 🚀')">
        Empezar
      </button>
    </div>
  </section>

  <footer>
    © 2026 Mi Proyecto
  </footer>

</body>
</html>
